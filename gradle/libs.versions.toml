coilNetworkOkhttp = "3.4.0"
datastore = "1.2.1"
datastorePreferences = "1.2.1"
kotlin = "2.3.20"
coreKtx = "1.18.0"
lifecycleRuntimeKtx = "2.10.0"
activityCompose = "1.13.0"
composeBom = "2026.03.01"
navigationCompose = "2.9.7"
prettytime = "5.0.8.Final"
